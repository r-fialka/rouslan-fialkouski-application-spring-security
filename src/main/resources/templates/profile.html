<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profile - Pay My Buddy</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">

</head>

<body>

<div class="page">

    <!-- ================= Navigation ================= -->

    <nav class="navbar">

        <div class="logo-nav">

            Pay My Buddy

        </div>

        <div class="menu">

            <a th:href="@{/home}">

                Transférer

            </a>

            <a class="active"
               th:href="@{/profile}">

                Profil

            </a>

            <a th:href="@{/add-relation}">

                Ajouter relation

            </a>

            <form th:action="@{/logout}"
                  method="post">

                <button
                        class="logout-button"
                        type="submit">

                    Se déconnecter

                </button>

            </form>

        </div>

    </nav>

    <!-- ================= Profile ================= -->

    <div class="profile-container">

        <h2>

            Mon Profil

        </h2>

        <!-- ================= Messages ================= -->

        <div th:if="${error}"
             class="error-message">

            <span th:text="${error}"></span>

        </div>

        <div th:if="${success}"
             class="success-message">

            <span th:text="${success}"></span>

        </div>

        <!-- ================= View Mode ================= -->

        <form th:if="${!editMode}"
              th:action="@{/profile}"
              method="get">

            <input
                    type="hidden"
                    name="edit"
                    value="true">

            <input

                    class="form-control"

                    type="text"

                    th:value="${user.userName}"

                    readonly>

            <input

                    class="form-control"

                    type="email"

                    th:value="${user.email}"

                    readonly>

            <input

                    class="form-control"

                    type="password"

                    value="********"

                    readonly>

            <button

                    class="primary-button"

                    type="submit">

                Modifier

            </button>

        </form>

        <!-- ================= Edit Mode ================= -->

        <form th:if="${editMode}"
              th:action="@{/profile}"
              method="post">

            <input

                    class="form-control"

                    type="text"

                    name="userName"

                    th:value="${user.userName}"

                    required>

            <input

                    class="form-control"

                    type="email"

                    name="email"

                    th:value="${user.email}"

                    required>

            <!-- ================= New Password ================= -->

            <div class="password-wrapper">

                <input

                        id="password"

                        class="form-control password-input"

                        type="password"

                        name="password"

                        placeholder="New password">

                <button

                        type="button"

                        class="toggle-password"

                        onclick="togglePassword('password', this)"

                        aria-label="Show password">

                    <!-- Closed Eye -->

                    <svg class="eye-closed"
                         xmlns="http://www.w3.org/2000/svg"
                         viewBox="0 0 24 24">

                        <path
                                d="M3 3L21 21M10.6 10.7A2 2 0 0013.4 13.3M9.9 5.1A10.9 10.9 0 0112 5c5 0 9.3 3.1 11 7-0.6 1.3-1.5 2.5-2.6 3.5M6.2 6.2C4.4 7.5 3 9.1 2 12c1.7 3.9 6 7 10 7 1.7 0 3.3-.4 4.8-1.1"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"/>

                    </svg>

                    <!-- Open Eye -->

                    <svg class="eye-open"
                         xmlns="http://www.w3.org/2000/svg"
                         viewBox="0 0 24 24">

                        <path
                                d="M2 12S6 5 12 5s10 7 10 7-4 7-10 7S2 12 2 12z"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"/>

                        <circle
                                cx="12"
                                cy="12"
                                r="3"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"/>

                    </svg>

                </button>

            </div>

            <!-- ================= Confirm Password ================= -->

            <div class="password-wrapper">

                <input

                        id="confirmPassword"

                        class="form-control password-input"

                        type="password"

                        name="confirmPassword"

                        placeholder="Confirm password">

                <button

                        type="button"

                        class="toggle-password"

                        onclick="togglePassword('confirmPassword', this)"

                        aria-label="Show password">

                    <!-- Closed Eye -->

                    <svg class="eye-closed"
                         xmlns="http://www.w3.org/2000/svg"
                         viewBox="0 0 24 24">

                        <path
                                d="M3 3L21 21M10.6 10.7A2 2 0 0013.4 13.3M9.9 5.1A10.9 10.9 0 0112 5c5 0 9.3 3.1 11 7-0.6 1.3-1.5 2.5-2.6 3.5M6.2 6.2C4.4 7.5 3 9.1 2 12c1.7 3.9 6 7 10 7 1.7 0 3.3-.4 4.8-1.1"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"/>

                    </svg>

                    <!-- Open Eye -->

                    <svg class="eye-open"
                         xmlns="http://www.w3.org/2000/svg"
                         viewBox="0 0 24 24">

                        <path
                                d="M2 12S6 5 12 5s10 7 10 7-4 7-10 7S2 12 2 12z"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"/>

                        <circle
                                cx="12"
                                cy="12"
                                r="3"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"/>

                    </svg>

                </button>

            </div>

            <!-- ================= Save Button ================= -->

            <button

                    class="primary-button"

                    type="submit">

                Enregistrer

            </button>

        </form>

    </div>

</div>

<script>

    function togglePassword(id, button) {

        const input = document.getElementById(id);

        const eyeOpen = button.querySelector(".eye-open");
        const eyeClosed = button.querySelector(".eye-closed");

        if (input.type === "password") {

            input.type = "text";

            eyeOpen.style.display = "block";
            eyeClosed.style.display = "none";

        } else {

            input.type = "password";

            eyeOpen.style.display = "none";
            eyeClosed.style.display = "block";

        }

    }

</script>

</body>

</html>
