<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Add Relation - Pay My Buddy</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/add-relation.css}">

</head>

<body>

<div class="page">

    <!-- ================= Navigation ================= -->

    <nav class="navbar">

        <div class="logo-nav">

            Pay My Buddy

        </div>

        <div class="menu">

            <a th:href="@{/home}">

                Transférer

            </a>

            <a th:href="@{/profile}">

                Profil

            </a>

            <a class="active"
               th:href="@{/add-relation}">

                Ajouter relation

            </a>

            <form th:action="@{/logout}"
                  method="post">

                <button
                        class="logout-button"
                        type="submit">

                    Se déconnecter

                </button>

            </form>

        </div>

    </nav>

    <!-- ================= Add Relation ================= -->

    <div class="relation-container">

        <h2>

            Chercher une relation

        </h2>

        <!-- ================= Messages ================= -->

        <div th:if="${success}"
             class="success-message">

            <span th:text="${success}"></span>

        </div>

        <div th:if="${error}"
             class="error-message">

            <span th:text="${error}"></span>

        </div>

        <!-- ================= Add Relation Form ================= -->

        <form th:action="@{/add-relation}"
              method="post">

            <input

                    class="form-control"

                    type="email"

                    name="email"

                    placeholder="Saisir une adresse mail"

                    required>

            <button

                    class="orange-button"

                    type="submit">

                Ajouter

            </button>

        </form>

    </div>

</div>

</body>

</html>
