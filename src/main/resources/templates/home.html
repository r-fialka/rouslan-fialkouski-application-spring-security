<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Transfer - Pay My Buddy</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">

</head>

<body>

<div class="page">

    <!-- ================= Navigation ================= -->

    <nav class="navbar">

        <div class="logo-nav">

            Pay My Buddy

        </div>

        <div class="menu">

            <a class="active"
               th:href="@{/home}">

                Transférer

            </a>

            <a th:href="@{/profile}">

                Profil

            </a>

            <a th:href="@{/add-relation}">

                Ajouter relation

            </a>

            <form th:action="@{/logout}"
                  method="post">

                <button
                        class="logout-button"
                        type="submit">

                    Se déconnecter

                </button>

            </form>

        </div>

    </nav>

    <!-- ================= Transfer Form ================= -->

    <div class="transfer-container">

        <form class="transfer-form"
              th:action="@{/transfer}"
              method="post">

            <select

                    class="transfer-select"

                    name="receiverId"

                    required>

                <option value="">

                    Sélectionner une relation

                </option>

                <option

                        th:each="connection : ${connections}"

                        th:value="${connection.id}"

                        th:text="${connection.userName}">

                </option>

            </select>

            <input

                    class="transfer-description"

                    type="text"

                    name="description"

                    placeholder="Description"

                    required>

            <input

                    class="transfer-amount"

                    type="number"

                    name="amount"

                    min="0.01"

                    step="0.01"

                    placeholder="0.00"

                    required>

            <button

                    class="pay-button"

                    type="submit">

                Payer

            </button>

        </form>

    </div>

    <!-- ================= Transaction History ================= -->

    <div class="transactions-card">

        <h2>

            Mes Transactions

        </h2>

        <table class="transactions-table">

            <!-- ================= Table Header ================= -->

            <thead>

            <tr>

                <th>Relations</th>

                <th>Description</th>

                <th>Montant</th>

            </tr>

            </thead>

            <!-- ================= Table Body ================= -->

            <tbody>

            <tr th:each="transaction : ${transactions}">

                <td th:text="${transaction.receiver.userName}"></td>

                <td th:text="${transaction.description}"></td>

                <td th:text="${#numbers.formatDecimal(transaction.amount, 1, 2)} + ' €'"></td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
